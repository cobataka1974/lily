<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>リリー ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #fdf6ee;
      color: #3d2e1e;
      min-height: 100vh;
    }

    /* ===== ログイン画面 ===== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, #fff8f0 0%, #fde8d8 100%);
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(180, 100, 60, 0.12);
      text-align: center;
    }

    .login-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #c06030;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: #9a7860;
      margin-bottom: 28px;
    }

    .pin-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .pin-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #d4956a;
      background: transparent;
      transition: background 0.15s;
    }

    .pin-dot.filled { background: #c06030; border-color: #c06030; }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .num-btn {
      background: #fff8f3;
      border: 1.5px solid #e8cbb4;
      border-radius: 16px;
      padding: 16px 0;
      font-size: 22px;
      font-weight: 600;
      color: #7a4a2a;
      cursor: pointer;
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .num-btn:active, .num-btn:hover {
      background: #ffe4cf;
      border-color: #c06030;
      transform: scale(0.96);
    }

    .num-btn.del { font-size: 18px; }
    .num-btn.empty { visibility: hidden; }

    .login-error {
      margin-top: 16px;
      color: #c04040;
      font-size: 13px;
      min-height: 20px;
    }

    /* ===== ダッシュボード ===== */
    #dashboard {
      display: none;
      padding-bottom: 40px;
    }

    .dash-header {
      background: linear-gradient(135deg, #c06030 0%, #e07840 100%);
      padding: 20px 20px 24px;
      color: white;
    }

    .dash-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .dash-title { font-size: 20px; font-weight: 700; }
    .dash-subtitle { font-size: 12px; opacity: 0.85; }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 20px;
      color: white;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
    }

    .last-updated {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 6px;
    }

    .dash-body { padding: 16px; }

    /* カード */
    .card {
      background: white;
      border-radius: 20px;
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(180, 100, 60, 0.08);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: #c06030;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 気分サマリー */
    .mood-summary {
      display: flex;
      gap: 10px;
    }

    .mood-item {
      flex: 1;
      text-align: center;
      background: #fdf6ee;
      border-radius: 14px;
      padding: 12px 8px;
    }

    .mood-date { font-size: 10px; color: #9a7860; margin-bottom: 4px; }
    .mood-emoji { font-size: 26px; line-height: 1; margin-bottom: 4px; }
    .mood-label { font-size: 11px; color: #5a3e2e; font-weight: 600; }
    .mood-reason { font-size: 10px; color: #9a7860; margin-top: 3px; line-height: 1.3; }

    /* 気分グラフ */
    .mood-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
      padding: 0 4px;
    }

    .chart-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }

    .chart-bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      transition: height 0.4s ease;
    }

    .chart-label { font-size: 9px; color: #9a7860; }

    /* ハイライト */
    .highlight-list { display: flex; flex-direction: column; gap: 10px; }

    .highlight-item {
      background: #fdf6ee;
      border-radius: 12px;
      padding: 12px 14px;
      border-left: 3px solid #e07840;
    }

    .highlight-topic {
      font-size: 13px;
      font-weight: 700;
      color: #5a3e2e;
      margin-bottom: 3px;
    }

    .highlight-reaction {
      font-size: 12px;
      color: #7a5a40;
      line-height: 1.5;
    }

    .highlight-emotion {
      display: inline-block;
      margin-top: 6px;
      background: #ffe4cf;
      color: #c06030;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }

    /* 懸念事項 */
    .concern-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #f0e4d8;
    }

    .concern-item:last-child { border-bottom: none; }

    .severity-badge {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .severity-high { background: #fde8e8; color: #c04040; }
    .severity-mid  { background: #fef3e2; color: #c08020; }
    .severity-low  { background: #e8f5e8; color: #407040; }

    .concern-text { font-size: 12px; color: #5a3e2e; line-height: 1.5; }

    /* ヒント */
    .hint-list { display: flex; flex-direction: column; gap: 8px; }

    .hint-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .hint-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      background: #c06030;
      color: white;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .hint-text { font-size: 12px; color: #5a3e2e; line-height: 1.6; }

    /* ===== スケジュール ===== */
    .schedule-add-btn {
      width: 100%;
      padding: 13px;
      background: #c06030;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .schedule-list { display: flex; flex-direction: column; gap: 10px; }

    .schedule-item {
      background: #fdf6ee;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .schedule-item.disabled { opacity: 0.5; }

    .schedule-toggle {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }

    .schedule-toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d4b896;
      border-radius: 13px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .schedule-toggle input:checked + .toggle-slider { background: #c06030; }
    .schedule-toggle input:checked + .toggle-slider:before { transform: translateX(18px); }

    .schedule-info { flex: 1; min-width: 0; }

    .schedule-time {
      font-size: 22px;
      font-weight: 700;
      color: #5a3e2e;
      line-height: 1;
      margin-bottom: 4px;
    }

    .schedule-days {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .day-chip {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      background: #ffe4cf;
      color: #c06030;
      font-weight: 600;
    }

    .day-chip.off { background: #f0e4d8; color: #b09880; }

    .schedule-delete {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #c09080;
      padding: 4px;
      flex-shrink: 0;
    }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 480px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #c06030;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-section { margin-bottom: 20px; }

    .modal-label {
      font-size: 12px;
      font-weight: 700;
      color: #9a7860;
      margin-bottom: 8px;
    }

    .time-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .time-select {
      font-size: 28px;
      font-weight: 700;
      color: #5a3e2e;
      border: 2px solid #e8cbb4;
      border-radius: 14px;
      padding: 10px 12px;
      background: #fdf6ee;
      text-align: center;
      width: 90px;
      -webkit-appearance: none;
      appearance: none;
    }

    .time-sep { font-size: 28px; font-weight: 700; color: #c06030; }

    .day-selector {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .day-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid #e8cbb4;
      background: #fdf6ee;
      font-size: 12px;
      font-weight: 700;
      color: #9a7860;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .day-btn.selected {
      background: #c06030;
      border-color: #c06030;
      color: white;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-cancel {
      flex: 1;
      padding: 14px;
      background: #f0e4d8;
      color: #9a7860;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-save {
      flex: 2;
      padding: 14px;
      background: #c06030;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ユーザーカード */
    .user-item {
      background: #fdf6ee; border-radius: 14px;
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .user-info { flex: 1; }
    .user-name { font-size: 16px; font-weight: 700; color: #5a3e2e; }
    .user-id   { font-size: 11px; color: #b09880; margin-top: 2px; }
    .user-url  { font-size: 11px; color: #c06030; margin-top: 4px; word-break: break-all; }
    .user-edit-btn {
      background: #f0e4d8; border: none; border-radius: 10px;
      padding: 8px 14px; font-size: 12px; color: #7a4a2a; cursor: pointer;
    }

    /* ユーザーモーダル */
    .modal-input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e8cbb4; border-radius: 12px;
      font-size: 15px; color: #5a3e2e;
      background: #fdf6ee; margin-bottom: 12px;
      box-sizing: border-box;
    }
    .modal-input:focus { outline: none; border-color: #c06030; }
    .modal-input-label { font-size: 12px; font-weight: 700; color: #9a7860; margin-bottom: 4px; }

    /* 今すぐ会話ボタン */
    .call-now-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #e07840 0%, #c06030 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 16px rgba(192, 96, 48, 0.3);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .call-now-btn:active { transform: scale(0.97); }
    .call-now-btn:disabled {
      background: #d4b896;
      box-shadow: none;
      cursor: default;
    }
    .call-now-status {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: #9a7860;
      min-height: 20px;
    }

    /* 空状態 */
    .empty-state {
      text-align: center;
      color: #b09880;
      font-size: 13px;
      padding: 20px 0;
    }

    /* ローディング */
    #loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf6ee;
    }

    .spinner {
      font-size: 40px;
      animation: spin 2s linear infinite;
    }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ローディング -->
<div id="loading"><div class="spinner">🌸</div></div>

<!-- ログイン画面 -->
<div id="login-screen" style="display:none;">
  <div class="login-card">
    <div class="login-icon">🌸</div>
    <div class="login-title">リリー ダッシュボード</div>
    <div class="login-sub">みつこさんの様子をお伝えします</div>
    <div class="pin-display">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="enterPin('1')">1</button>
      <button class="num-btn" onclick="enterPin('2')">2</button>
      <button class="num-btn" onclick="enterPin('3')">3</button>
      <button class="num-btn" onclick="enterPin('4')">4</button>
      <button class="num-btn" onclick="enterPin('5')">5</button>
      <button class="num-btn" onclick="enterPin('6')">6</button>
      <button class="num-btn" onclick="enterPin('7')">7</button>
      <button class="num-btn" onclick="enterPin('8')">8</button>
      <button class="num-btn" onclick="enterPin('9')">9</button>
      <button class="num-btn empty"></button>
      <button class="num-btn" onclick="enterPin('0')">0</button>
      <button class="num-btn del" onclick="deletePin()">⌫</button>
    </div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ダッシュボード -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-header-top">
      <div>
        <div class="dash-title">🌸 リリーの記録</div>
        <div class="dash-subtitle" id="dash-subtitle">会話ログ</div>
      </div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
    <div class="last-updated" id="last-updated"></div>
  </div>

  <div class="dash-body">

    <!-- 最近の気分 -->
    <div class="card">
      <div class="card-title">😊 最近の気分</div>
      <div class="mood-summary" id="mood-summary">
        <div class="empty-state">データがありません</div>
      </div>
    </div>

    <!-- 気分の推移 -->
    <div class="card">
      <div class="card-title">📈 気分の推移</div>
      <div class="mood-chart" id="mood-chart"></div>
    </div>

    <!-- 盛り上がった話題 -->
    <div class="card">
      <div class="card-title">✨ 盛り上がった話題（最新）</div>
      <div class="highlight-list" id="highlight-list">
        <div class="empty-state">データがありません</div>
      </div>
    </div>

    <!-- 次回おすすめの話題 -->
    <div class="card">
      <div class="card-title">💬 次回おすすめの話題</div>
      <div class="hint-list" id="hint-list">
        <div class="empty-state">データがありません</div>
      </div>
    </div>

    <!-- 気になること -->
    <div class="card" id="concern-card">
      <div class="card-title">⚠️ 気になること</div>
      <div id="concern-list">
        <div class="empty-state">特になし</div>
      </div>
    </div>

    <!-- ユーザー管理 -->
    <div class="card" id="user-mgmt-card">
      <div class="card-title">👤 ユーザー管理</div>
      <div id="user-list" style="margin-bottom:12px;"></div>
      <button class="schedule-add-btn" onclick="openUserModal()">＋ 新しいユーザーを追加</button>
    </div>

    <!-- 今すぐ会話 -->
    <div class="card">
      <div class="card-title">📞 遠隔操作</div>
      <button class="call-now-btn" id="call-now-btn" onclick="callNow()">
        🌸 今すぐ会話を始める
      </button>
      <div class="call-now-status" id="call-now-status"></div>
    </div>

    <!-- スケジュール設定 -->
    <div class="card">
      <div class="card-title">⏰ 会話スケジュール</div>
      <button class="schedule-add-btn" onclick="openModal()">＋ スケジュールを追加</button>
      <div class="schedule-list" id="schedule-list">
        <div class="empty-state">スケジュールがありません</div>
      </div>
    </div>

  </div>
</div>

<!-- ユーザー追加・編集モーダル -->
<div class="modal-overlay" id="user-modal-overlay">
  <div class="modal">
    <div class="modal-title">👤 ユーザー設定</div>
    <div class="modal-input-label">ユーザーID（英数字、変更不可）</div>
    <input class="modal-input" id="modal-user-id" type="text" placeholder="例: hanako001">
    <div class="modal-input-label">名前</div>
    <input class="modal-input" id="modal-user-name" type="text" placeholder="例: はなこ">
    <div class="modal-input-label">ElevenLabs Agent ID</div>
    <input class="modal-input" id="modal-user-agentId" type="text" placeholder="agent_xxxxxxxxx">
    <div class="modal-input-label">Voice ID（声のクローンID）</div>
    <input class="modal-input" id="modal-user-voiceId" type="text" placeholder="ElevenLabsのVoice ID">
    <div class="modal-input-label">PINコード（4桁）</div>
    <input class="modal-input" id="modal-user-pin" type="number" placeholder="1234">
    <div class="modal-input-label">システムプロンプト（省略可）</div>
    <textarea class="modal-input" id="modal-user-prompt" rows="3" placeholder="AIへの指示（空欄の場合はデフォルトを使用）"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUserModal()">キャンセル</button>
      <button class="btn-save" onclick="saveUser()">保存</button>
    </div>
  </div>
</div>

<!-- スケジュール追加モーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">⏰ スケジュールを設定</div>

    <div class="modal-section">
      <div class="modal-label">時間</div>
      <div class="time-picker">
        <select class="time-select" id="modal-hour">
          <script>for(var i=0;i<24;i++){document.write('<option value="'+i+'"'+(i===10?' selected':'')+'>'+String(i).padStart(2,'0')+'</option>');}</script>
        </select>
        <span class="time-sep">:</span>
        <select class="time-select" id="modal-minute">
          <option value="0" selected>00</option>
          <option value="15">15</option>
          <option value="30">30</option>
          <option value="45">45</option>
        </select>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-label">曜日</div>
      <div class="day-selector">
        <button class="day-btn" data-day="1">月</button>
        <button class="day-btn" data-day="2">火</button>
        <button class="day-btn" data-day="3">水</button>
        <button class="day-btn" data-day="4">木</button>
        <button class="day-btn" data-day="5">金</button>
        <button class="day-btn" data-day="6">土</button>
        <button class="day-btn" data-day="0">日</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveSchedule()">保存</button>
    </div>
  </div>
</div>

<script>
  var CORRECT_PIN = '1423'; // デフォルト（ユーザー設定から上書き）
  var DAY_NAMES = ['日','月','火','水','木','金','土'];
  var schedules = [];
  var selectedDays = [];
  var currentUserId = new URLSearchParams(window.location.search).get('id') || 'default';
  var SESSION_KEY = 'lily_dash_auth_' + currentUserId; // ユーザー別セッション
  var pinInput = '';

  // ===== 起動 =====
  window.addEventListener('load', async function() {
    document.getElementById('loading').style.display = 'none';

    // ユーザー設定からPINを取得
    try {
      var res = await fetch('/lily/api/user-config?userId=' + encodeURIComponent(currentUserId));
      var data = await res.json();
      if (data.status === 'ok' && data.pin) {
        CORRECT_PIN = String(data.pin);
      }
      // ユーザー名をログイン画面・ダッシュボードに表示
      if (data.name) {
        var sub = document.querySelector('.login-sub');
        if (sub) sub.textContent = data.name + 'さんの様子をお伝えします';
        var dashSub = document.getElementById('dash-subtitle');
        if (dashSub) dashSub.textContent = data.name + 'さんの会話ログ';
        var callStatus = document.getElementById('call-status');
        if (callStatus) callStatus.textContent = data.name + 'さんの画面でまもなく会話が始まります（最大10秒）';
      }
    } catch(e) { /* デフォルトPIN使用 */ }

    if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
      showDashboard();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
    }
  });

  // ===== PIN入力 =====
  function enterPin(digit) {
    if (pinInput.length >= 4) return;
    pinInput += digit;
    updateDots();
    if (pinInput.length === 4) {
      setTimeout(checkPin, 120);
    }
  }

  function deletePin() {
    pinInput = pinInput.slice(0, -1);
    updateDots();
    document.getElementById('login-error').textContent = '';
  }

  function updateDots() {
    for (var i = 0; i < 4; i++) {
      document.getElementById('dot' + i).classList.toggle('filled', i < pinInput.length);
    }
  }

  function checkPin() {
    if (pinInput === CORRECT_PIN) {
      sessionStorage.setItem(SESSION_KEY, 'ok');
      document.getElementById('login-screen').style.display = 'none';
      showDashboard();
    } else {
      document.getElementById('login-error').textContent = '暗証番号が違います';
      pinInput = '';
      updateDots();
      // 振動フィードバック
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    pinInput = '';
    updateDots();
    document.getElementById('login-error').textContent = '';
  }

  // ===== ダッシュボード表示 =====
  function showDashboard() {
    document.getElementById('dashboard').style.display = 'block';
    loadData();
    loadScheduleData();
  }

  // ===== データ取得 =====
  async function loadData() {
    try {
      var res = await fetch('/lily/api/sessions?userId=' + encodeURIComponent(currentUserId));
      var data = await res.json();
      loadUsers();
    if (data.status === 'ok' && data.sessions && data.sessions.length > 0) {
        renderDashboard(data.sessions);
      } else {
        renderEmpty();
      }
    } catch (e) {
      console.error('データ取得失敗:', e);
      renderEmpty();
    }
  }

  function renderEmpty() {
    document.getElementById('last-updated').textContent = 'データがまだありません';
  }

  // ===== レンダリング =====
  function moodEmoji(mood) {
    if (!mood) return '—';
    if (mood.includes('良')) return '😊';
    if (mood.includes('普通')) return '😐';
    if (mood.includes('悪')) return '😔';
    return '😊';
  }

  function moodColor(mood) {
    if (!mood) return '#e0d0c0';
    if (mood.includes('良')) return '#f4a460';
    if (mood.includes('普通')) return '#d4b896';
    if (mood.includes('悪')) return '#c0a090';
    return '#f4a460';
  }

  function moodHeight(mood) {
    if (!mood) return 30;
    if (mood.includes('良')) return 72;
    if (mood.includes('普通')) return 44;
    if (mood.includes('悪')) return 22;
    return 44;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    var d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    var m = d.getMonth() + 1;
    var day = d.getDate();
    return m + '/' + day;
  }

  // ===== スケジュール =====
  async function loadScheduleData() {
    try {
      var res = await fetch('/lily/api/schedule');
      var data = await res.json();
      schedules = data.schedules || [];
      renderSchedule();
    } catch(e) {
      console.warn('スケジュール取得失敗:', e);
    }
  }

  function renderSchedule() {
    var el = document.getElementById('schedule-list');
    if (schedules.length === 0) {
      el.innerHTML = '<div class="empty-state">スケジュールがありません</div>';
      return;
    }
    // 時間順にソート
    var sorted = schedules.slice().sort(function(a, b) {
      return (a.hour * 60 + a.minute) - (b.hour * 60 + b.minute);
    });
    el.innerHTML = sorted.map(function(s) {
      var timeStr = String(s.hour).padStart(2,'0') + ':' + String(s.minute || 0).padStart(2,'0');
      var dayChips = DAY_NAMES.map(function(n, i) {
        var on = (s.days || []).indexOf(i) !== -1;
        return '<span class="day-chip' + (on ? '' : ' off') + '">' + n + '</span>';
      }).join('');
      return '<div class="schedule-item' + (s.enabled ? '' : ' disabled') + '" data-id="' + s.id + '">'
        + '<label class="schedule-toggle">'
        + '<input type="checkbox"' + (s.enabled ? ' checked' : '') + ' onchange="toggleSchedule(\'' + s.id + '\')">'
        + '<span class="toggle-slider"></span>'
        + '</label>'
        + '<div class="schedule-info">'
        + '<div class="schedule-time">' + timeStr + '</div>'
        + '<div class="schedule-days">' + dayChips + '</div>'
        + '</div>'
        + '<button class="schedule-delete" onclick="deleteSchedule(\'' + s.id + '\')">🗑</button>'
        + '</div>';
    }).join('');
  }

  function openModal() {
    selectedDays = [1,2,3,4,5]; // 平日をデフォルト選択
    document.querySelectorAll('.day-btn').forEach(function(btn) {
      var d = parseInt(btn.dataset.day);
      btn.classList.toggle('selected', selectedDays.indexOf(d) !== -1);
      btn.onclick = function() {
        var idx = selectedDays.indexOf(d);
        if (idx === -1) { selectedDays.push(d); btn.classList.add('selected'); }
        else { selectedDays.splice(idx, 1); btn.classList.remove('selected'); }
      };
    });
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  async function saveSchedule() {
    var hour   = parseInt(document.getElementById('modal-hour').value);
    var minute = parseInt(document.getElementById('modal-minute').value);
    if (selectedDays.length === 0) {
      alert('曜日を1つ以上選択してください');
      return;
    }
    var newItem = {
      id: 'sch_' + Date.now(),
      hour: hour,
      minute: minute,
      days: selectedDays.slice(),
      enabled: true,
    };
    schedules.push(newItem);
    await postSchedule();
    renderSchedule();
    closeModal();
  }

  async function toggleSchedule(id) {
    schedules = schedules.map(function(s) {
      if (s.id === id) return Object.assign({}, s, { enabled: !s.enabled });
      return s;
    });
    await postSchedule();
    renderSchedule();
  }

  async function deleteSchedule(id) {
    if (!confirm('このスケジュールを削除しますか？')) return;
    schedules = schedules.filter(function(s) { return s.id !== id; });
    await postSchedule();
    renderSchedule();
  }

  // ===== ユーザー管理 =====
  var editingUserId = null;

  async function loadUsers() {
    try {
      var res = await fetch('/lily/api/user-config?action=users');
      var data = await res.json();
      renderUsers(data.users || []);
    } catch(e) {
      console.warn('ユーザー一覧取得失敗:', e);
    }
  }

  function renderUsers(users) {
    var el = document.getElementById('user-list');
    if (!users.length) {
      el.innerHTML = '<div class="empty-state">ユーザーがいません</div>';
      return;
    }
    el.innerHTML = users.map(function(u) {
      var url = 'https://bvjozroi.gensparkclaw.com/lily/?id=' + encodeURIComponent(u.userId);
      return '<div class="user-item">'
        + '<div class="user-info">'
        + '<div class="user-name">' + (u.name || u.userId) + 'さん</div>'
        + '<div class="user-id">ID: ' + u.userId + '</div>'
        + '<div class="user-url">🔗 <a href="' + url + '" target="_blank">' + url + '</a></div>'
        + '</div>'
        + '<button class="user-edit-btn" onclick="openUserModal(\'' + u.userId + '\')">編集</button>'
        + '</div>';
    }).join('');
  }

  function openUserModal(userId) {
    editingUserId = userId || null;
    document.getElementById('modal-user-id').value = userId || '';
    document.getElementById('modal-user-name').value = '';
    document.getElementById('modal-user-agentId').value = '';
    document.getElementById('modal-user-voiceId').value = '';
    document.getElementById('modal-user-pin').value = '';
    document.getElementById('modal-user-prompt').value = '';
    document.getElementById('user-modal-overlay').classList.add('open');
  }

  function closeUserModal() {
    document.getElementById('user-modal-overlay').classList.remove('open');
  }

  async function saveUser() {
    var userId = document.getElementById('modal-user-id').value.trim();
    var name   = document.getElementById('modal-user-name').value.trim();
    var agentId = document.getElementById('modal-user-agentId').value.trim();
    var voiceId = document.getElementById('modal-user-voiceId').value.trim();
    var pin    = document.getElementById('modal-user-pin').value.trim();
    var prompt = document.getElementById('modal-user-prompt').value.trim();

    if (!userId || !name) { alert('IDと名前は必須です'); return; }

    try {
      var res = await fetch('/lily/api/user-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, name, agentId, voiceId, pin, prompt }),
      });
      var data = await res.json();
      if (data.status === 'ok') {
        closeUserModal();
        loadUsers();
        alert('保存しました！\n\nURL: https://bvjozroi.gensparkclaw.com/lily/?id=' + userId);
      } else {
        alert('エラー: ' + data.message);
      }
    } catch(e) {
      alert('保存失敗: ' + e.message);
    }
  }

  // ===== 今すぐ会話 =====
  async function callNow() {
    var btn = document.getElementById('call-now-btn');
    var statusEl = document.getElementById('call-now-status');
    btn.disabled = true;
    btn.textContent = '⏳ 送信中…';
    statusEl.textContent = '';
    try {
      // 現在表示中のユーザーIDを取得（URLパラメータ or デフォルト）
      var targetUserId = new URLSearchParams(window.location.search).get('id') || 'default';
      var res = await fetch('/lily/api/call-now', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: targetUserId }),
      });
      var data = await res.json();
      if (data.status === 'ok') {
        btn.textContent = '✅ 送信しました！';
        statusEl.textContent = 'みつこさんの画面でまもなく会話が始まります（最大10秒）';
        setTimeout(function() {
          btn.disabled = false;
          btn.textContent = '🌸 今すぐ会話を始める';
          statusEl.textContent = '';
        }, 10000);
      } else {
        throw new Error(data.message || 'エラー');
      }
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '🌸 今すぐ会話を始める';
      statusEl.textContent = '⚠️ 送信に失敗しました：' + e.message;
    }
  }

  async function postSchedule() {
    try {
      await fetch('/lily/api/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ schedules: schedules }),
      });
    } catch(e) {
      console.error('スケジュール保存失敗:', e);
    }
  }

  // モーダル外タップで閉じる
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function renderDashboard(sessions) {
    // 日付順にソート（新しい順）
    sessions.sort(function(a, b) {
      return new Date(b.session_date) - new Date(a.session_date);
    });

    var latest = sessions[0];

    // 最終更新
    document.getElementById('last-updated').textContent =
      '最終更新: ' + (latest.session_date || '—');

    // 最近の気分（直近3件）
    var recent = sessions.slice(0, 3).reverse(); // 古い順に並べ直す
    var moodHtml = recent.map(function(s) {
      return '<div class="mood-item">'
        + '<div class="mood-date">' + formatDate(s.session_date) + '</div>'
        + '<div class="mood-emoji">' + moodEmoji(s.overall_mood) + '</div>'
        + '<div class="mood-label">' + (s.overall_mood || '—') + '</div>'
        + '<div class="mood-reason">' + (s.mood_reason || '') + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('mood-summary').innerHTML = moodHtml || '<div class="empty-state">データがありません</div>';

    // 気分グラフ（直近10件）
    var chartData = sessions.slice(0, 10).reverse();
    var chartHtml = chartData.map(function(s) {
      var h = moodHeight(s.overall_mood);
      var c = moodColor(s.overall_mood);
      return '<div class="chart-bar-wrap">'
        + '<div class="chart-bar" style="height:' + h + 'px; background:' + c + ';"></div>'
        + '<div class="chart-label">' + formatDate(s.session_date) + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('mood-chart').innerHTML = chartHtml || '';

    // 最新セッションのハイライト
    var highlights = latest.highlight_moments || [];
    if (typeof highlights === 'string') {
      try { highlights = JSON.parse(highlights); } catch(e) { highlights = []; }
    }
    var hlHtml = highlights.slice(0, 3).map(function(h) {
      return '<div class="highlight-item">'
        + '<div class="highlight-topic">🗣 ' + (h.topic || '') + '</div>'
        + '<div class="highlight-reaction">' + (h.reaction || '') + '</div>'
        + (h.emotion ? '<span class="highlight-emotion">' + h.emotion + '</span>' : '')
        + '</div>';
    }).join('');
    document.getElementById('highlight-list').innerHTML =
      hlHtml || '<div class="empty-state">データがありません</div>';

    // 次回ヒント（直近セッションから収集）
    var hints = [];
    sessions.slice(0, 3).forEach(function(s) {
      var sh = s.next_session_hints || [];
      if (typeof sh === 'string') { try { sh = JSON.parse(sh); } catch(e) { sh = []; } }
      sh.forEach(function(h) {
        if (h && h.hint && hints.indexOf(h.hint) === -1) hints.push(h.hint);
      });
    });
    var hintHtml = hints.slice(0, 5).map(function(hint, i) {
      return '<div class="hint-item">'
        + '<div class="hint-num">' + (i + 1) + '</div>'
        + '<div class="hint-text">' + hint + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('hint-list').innerHTML =
      hintHtml || '<div class="empty-state">データがありません</div>';

    // 懸念事項（全セッションから高/中のみ）
    var concerns = [];
    sessions.slice(0, 5).forEach(function(s) {
      var sc = s.concerns || [];
      if (typeof sc === 'string') { try { sc = JSON.parse(sc); } catch(e) { sc = []; } }
      sc.filter(function(c) { return c && c.severity && c.severity !== '低'; })
        .forEach(function(c) { concerns.push(c); });
    });
    var concernHtml = concerns.slice(0, 5).map(function(c) {
      var sev = c.severity || '';
      var cls = sev === '高' ? 'severity-high' : sev === '中' ? 'severity-mid' : 'severity-low';
      var label = sev === '高' ? '⚠️ 高' : sev === '中' ? '注意' : '低';
      return '<div class="concern-item">'
        + '<span class="severity-badge ' + cls + '">' + label + '</span>'
        + '<div class="concern-text">' + (c.type || '') + '：' + (c.detail || '') + '</div>'
        + '</div>';
    }).join('');
    document.getElementById('concern-list').innerHTML =
      concernHtml || '<div class="empty-state">特になし ✨</div>';
  }
</script>
</body>
</html>
