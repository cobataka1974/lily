<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みつこのお話し相手</title>
  <!-- PWA -->
  <link rel="manifest" href="/public/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="リリー">
  <meta name="theme-color" content="#5a7a4a">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --washi: #f5f0e8;
      --ink: #2c2416;
      --ink-light: #6b5d4f;
      --matcha: #5a7a4a;
      --matcha-light: #8aaa72;
      --sakura: #c9816a;
      --gold: #b8955a;
      --shadow: rgba(44, 36, 22, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--washi);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Noto Serif JP', serif;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(90,122,74,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,129,106,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .leaf { position: fixed; opacity: 0.07; pointer-events: none; }
    .leaf svg { fill: var(--matcha); }
    .leaf-1 { top: -20px; left: -30px; transform: rotate(20deg); width: 200px; }
    .leaf-2 { bottom: -20px; right: -20px; transform: rotate(200deg); width: 180px; }
    .vline { position: fixed; top: 0; bottom: 0; width: 1px; background: linear-gradient(to bottom, transparent, var(--gold), transparent); opacity: 0.2; }
    .vline-1 { left: 60px; } .vline-2 { right: 60px; }

    .container {
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      position: relative; z-index: 1; padding: 40px 20px;
    }
    #clock { font-family: 'Noto Sans JP', sans-serif; font-size: 3rem; font-weight: 200; color: var(--ink); letter-spacing: 0.05em; opacity: 0.7; }
    .date-block { text-align: center; }
    .date-day { font-family: 'Noto Sans JP', sans-serif; font-size: 1rem; font-weight: 300; color: var(--ink-light); letter-spacing: 0.3em; margin-bottom: 4px; }
    .date-main { font-size: 2.4rem; font-weight: 300; color: var(--ink); letter-spacing: 0.1em; }
    .date-main span { font-size: 1.1rem; color: var(--ink-light); margin-left: 4px; }
    .divider { width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
    .title { text-align: center; }
    .title-sub { font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem; font-weight: 300; color: var(--ink-light); letter-spacing: 0.5em; margin-bottom: 8px; }
    .title-main { font-size: 1.6rem; font-weight: 400; color: var(--ink); letter-spacing: 0.2em; }

    #main-btn {
      width: 220px; height: 220px; border-radius: 50%;
      border: 2px solid var(--matcha-light);
      background: radial-gradient(circle at 35% 35%, #ffffff, #eef5e8);
      color: var(--matcha); font-family: 'Noto Serif JP', serif;
      font-size: 1.4rem; font-weight: 400; cursor: pointer;
      box-shadow: 0 8px 32px var(--shadow), inset 0 2px 8px rgba(255,255,255,0.8), 0 0 0 8px rgba(90,122,74,0.06);
      transition: all 0.3s ease; line-height: 1.6; letter-spacing: 0.1em;
      position: relative; overflow: hidden;
    }
    #main-btn::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), transparent 70%);
      pointer-events: none;
    }
    #main-btn:hover { transform: scale(1.03); }
    #main-btn:active { transform: scale(0.97); }
    #main-btn.connecting {
      border-color: var(--gold); color: var(--gold);
      background: radial-gradient(circle at 35% 35%, #ffffff, #fdf8f0);
      animation: breathe 2s ease-in-out infinite;
    }
    #main-btn.talking {
      border-color: var(--sakura); color: var(--sakura);
      background: radial-gradient(circle at 35% 35%, #ffffff, #fdf0ec);
      animation: pulse-sakura 2s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
    @keyframes pulse-sakura {
      0%,100%{box-shadow:0 8px 32px rgba(201,129,106,0.2),inset 0 2px 8px rgba(255,255,255,0.8),0 0 0 8px rgba(201,129,106,0.08)}
      50%{box-shadow:0 8px 32px rgba(201,129,106,0.3),inset 0 2px 8px rgba(255,255,255,0.8),0 0 0 16px rgba(201,129,106,0.04)}
    }

    .status-block { text-align: center; min-height: 60px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #status { font-family: 'Noto Sans JP', sans-serif; font-size: 1.1rem; font-weight: 300; color: var(--ink-light); letter-spacing: 0.15em; }
    #log { font-family: 'Noto Sans JP', sans-serif; font-size: 0.75rem; color: #aaa; }
    #next-info { font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; color: var(--gold); letter-spacing: 0.1em; opacity: 0.9; }
    .footer-ornament { font-size: 1.2rem; color: var(--gold); opacity: 0.5; letter-spacing: 0.5em; }

    /* ===== スクリーンセーバー ===== */
    #screensaver {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 50%, #1a0a1a 100%);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 1.5s ease;
    }
    #screensaver.active { display: flex; }
    #screensaver.visible { opacity: 1; }
    #ss-clock {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 6rem; font-weight: 100;
      color: rgba(255,220,220,0.9);
      letter-spacing: 0.1em;
      text-shadow: 0 0 60px rgba(201,129,106,0.6);
      animation: ss-float 8s ease-in-out infinite;
    }
    #ss-date {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.6rem; font-weight: 300;
      color: rgba(255,200,200,0.5);
      letter-spacing: 0.3em; margin-top: 16px;
      animation: ss-float 8s ease-in-out infinite 1s;
    }
    #ss-msg {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.1rem; font-weight: 300;
      color: rgba(201,129,106,0.4);
      letter-spacing: 0.3em; margin-top: 50px;
      animation: ss-pulse 4s ease-in-out infinite;
    }
    @keyframes ss-float {
      0%,100%{ transform: translateY(0px); }
      50%{ transform: translateY(-14px); }
    }
    @keyframes ss-pulse {
      0%,100%{ opacity: 0.2; }
      50%{ opacity: 0.7; }
    }
    .petal {
      position: fixed; pointer-events: none;
      color: rgba(220,150,150,0.7);
      animation: petal-fall linear infinite;
    }
    @keyframes petal-fall {
      0%{ transform: translateY(-30px) rotate(0deg) translateX(0px); opacity: 0.8; }
      25%{ transform: translateY(25vh) rotate(90deg) translateX(20px); }
      50%{ transform: translateY(50vh) rotate(180deg) translateX(-10px); }
      75%{ transform: translateY(75vh) rotate(270deg) translateX(15px); }
      100%{ transform: translateY(110vh) rotate(360deg) translateX(0px); opacity: 0; }
    }

    /* 初回タップバナー */
    #ready-banner {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--matcha); color: white;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1.1rem; font-weight: 300;
      text-align: center; padding: 16px;
      letter-spacing: 0.15em; z-index: 200; cursor: pointer;
      animation: slideDown 0.5s ease;
    }
    #ready-banner.hidden { display: none; }
    @keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }
  </style>
</head>
<body>

  <!-- スクリーンセーバー -->
  <div id="screensaver">
    <div id="ss-clock">00:00</div>
    <div id="ss-date"></div>
    <div id="ss-msg">🌸 またお話ししましょう</div>
  </div>

  <div id="ready-banner" onclick="activatePage()">
    🎋 ここをタップして準備完了にする
  </div>

  <div class="leaf leaf-1">
    <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 0 Q150 80 120 160 Q90 240 100 300 Q110 240 80 160 Q50 80 100 0Z"/>
      <path d="M80 60 Q30 100 20 160 Q70 130 80 60Z"/>
      <path d="M120 60 Q170 100 180 160 Q130 130 120 60Z"/>
    </svg>
  </div>
  <div class="leaf leaf-2">
    <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 0 Q150 80 120 160 Q90 240 100 300 Q110 240 80 160 Q50 80 100 0Z"/>
    </svg>
  </div>
  <div class="vline vline-1"></div>
  <div class="vline vline-2"></div>

  <div class="container">
    <div id="clock">00:00</div>
    <div class="date-block">
      <div class="date-day" id="weekday"></div>
      <div class="date-main" id="datetext"></div>
    </div>
    <div class="divider"></div>
    <div class="title">
      <div class="title-sub">お話し相手</div>
      <div class="title-main">みつこさんへ</div>
    </div>
    <button id="main-btn" onclick="onBtnClick()">🎋<br>お話しする</button>
    <div class="status-block">
      <div id="status">準備中です…</div>
      <div id="log">読み込み中…</div>
    </div>
    <div id="next-info"></div>
    <div class="footer-ornament">〜 ✦ 〜</div>
  </div>

  <script>
    // ===== スケジュール =====
    var SCHEDULE = {
      0: [8,11,14,17,20],  // 日
      1: [],               // 月
      2: [],               // 火
      3: [8,11,14,17,20],  // 水
      4: [],               // 木
      5: [],               // 金
      6: [8,11,14,17,20],  // 土
    };

    var WEEKDAYS = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
    var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    var pageActivated = false;
    var conversation = null;
    var Conversation = null;
    var sdkLoaded = false;
    var lastTriggeredKey = '';
    var ssTimer = null;
    var petals = [];
    var agentId = '';  // /api/config から取得

    // ===== リリー バックエンド連携 =====
    var BASE_PROMPT = 'あなたはみつこさん（78歳、認知症）のお話し相手「リリー」です。\n'
      + '・ゆっくり、短く、1文ずつ話す\n'
      + '・1回の発言に質問は1つだけ\n'
      + '・失敗やミスを責めない\n'
      + '・「なつかしい」「うれしい」を引き出す話題を使う\n'
      + '・盛り上がった話題の例：向島・もんじゃ焼き・牛島神社・コロッケ・家族との思い出\n'
      + '・みつこさんがリリーを「お父さん」「ちゅうかさん」と呼んでも自然に応答する';

    var systemPromptAddition = ''; // /api/memory から取得した追加プロンプト
    var sessionStartTime = null;   // 会話開始時刻
    var currentConversationId = null; // 今回の conversationId（ElevenLabs から取得）

    /**
     * 起動時に /api/memory を呼び出してシステムプロンプト追加分を取得する
     */
    async function loadMemory() {
      try {
        log('記憶を読み込み中…');
        var res = await fetch('/api/memory');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        if (data.status === 'ok') {
          systemPromptAddition = data.prompt_addition || '';
          console.log('[memory] prompt_addition:', systemPromptAddition);
          console.log('[memory] recent_hints:', data.recent_hints);
          log(sdkLoaded ? (pageActivated ? '✅ 準備完了' : '✅ SDK読み込み完了') : '記憶を読み込みました');
        }
      } catch (err) {
        console.warn('[memory] 読み込み失敗（続行します）:', err.message);
      }
    }

    /**
     * 会話終了時に /api/analyze へ POST してトランスクリプトを分析・保存する
     * @param {string} conversationId - ElevenLabs の conversationId
     */
    async function postAnalyze(conversationId) {
      try {
        log('会話を分析中…');
        var today = new Date();
        var sessionDate = today.getFullYear() + '-'
          + String(today.getMonth() + 1).padStart(2, '0') + '-'
          + String(today.getDate()).padStart(2, '0');

        var body = { sessionDate: sessionDate };
        if (conversationId) {
          body.conversationId = conversationId;
        }

        var res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          var errData = await res.json().catch(function() { return {}; });
          throw new Error('HTTP ' + res.status + ': ' + (errData.message || ''));
        }
        var data = await res.json();
        if (data.status === 'ok') {
          console.log('[analyze] 分析完了:', data.analysis);
          // 次回のために prompt_addition を更新
          if (data.analysis && data.analysis.prompt_addition) {
            systemPromptAddition = data.analysis.prompt_addition;
          }
          log('✅ 分析が完了しました');
        } else {
          throw new Error(data.message || '分析に失敗しました');
        }
      } catch (err) {
        console.warn('[analyze] 分析失敗（続行します）:', err.message);
        log('✅ 準備完了');
      }
    }

    /**
     * 起動時に /api/config を呼び出して agentId を取得する
     */
    async function loadConfig() {
      try {
        log('設定を読み込み中…');
        var res = await fetch('/api/config');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        if (data.agentId) {
          agentId = data.agentId;
          console.log('[config] agentId 取得完了');
        } else {
          throw new Error('agentId が取得できませんでした');
        }
      } catch (err) {
        console.error('[config] 設定の読み込みに失敗しました:', err.message);
        log('設定の読み込みに失敗しました: ' + err.message);
      }
    }

    // 起動時に設定とメモリを読み込む
    (async function init() {
      await loadConfig();
      await loadMemory();
    })();

    var logEl = document.getElementById('log');
    var statusEl = document.getElementById('status');
    var btn = document.getElementById('main-btn');
    var ss = document.getElementById('screensaver');

    function log(msg) { logEl.textContent = msg; console.log(msg); }

    // ===== スクリーンセーバー =====
    function showScreensaver() {
      var now = new Date();
      var h = String(now.getHours()).padStart(2,'0');
      var m = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('ss-clock').textContent = h + ':' + m;
      document.getElementById('ss-date').textContent =
        now.getFullYear() + '年 ' + MONTHS[now.getMonth()] + now.getDate() + '日 ' + WEEKDAYS[now.getDay()];

      ss.classList.add('active');
      setTimeout(function() { ss.classList.add('visible'); }, 50);

      // 花びらを生成
      for (var i = 0; i < 18; i++) {
        createPetal(i * 0.8);
      }

      // スクリーンセーバー内の時計を毎分更新
      ssTimer = setInterval(function() {
        var n = new Date();
        var hh = String(n.getHours()).padStart(2,'0');
        var mm = String(n.getMinutes()).padStart(2,'0');
        document.getElementById('ss-clock').textContent = hh + ':' + mm;
      }, 10000);
    }

    function createPetal(delay) {
      var p = document.createElement('div');
      p.className = 'petal';
      p.textContent = '🌸';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
      p.style.animationDuration = (8 + Math.random() * 10) + 's';
      p.style.animationDelay = delay + 's';
      ss.appendChild(p);
      petals.push(p);
    }

    function hideScreensaver() {
      ss.classList.remove('visible');
      setTimeout(function() {
        ss.classList.remove('active');
        // 花びらを削除
        petals.forEach(function(p) { if (p.parentNode) p.parentNode.removeChild(p); });
        petals = [];
      }, 1500);
      if (ssTimer) { clearInterval(ssTimer); ssTimer = null; }
    }

    // ===== 時計・日付 =====
    function updateClock() {
      var now = new Date();
      var h = String(now.getHours()).padStart(2,'0');
      var m = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = h + ':' + m;
      document.getElementById('weekday').textContent =
        now.getFullYear() + '年　' + WEEKDAYS[now.getDay()];
      document.getElementById('datetext').innerHTML =
        MONTHS[now.getMonth()] + '<span>' + now.getDate() + '日</span>';
      updateNextInfo(now);
    }

    function getNextSchedule(now) {
      var day = now.getDay(), h = now.getHours();
      var todayHours = SCHEDULE[day] || [];
      for (var i = 0; i < todayHours.length; i++) {
        if (todayHours[i] > h) return { label: '今日', hour: todayHours[i] };
      }
      for (var d = 1; d <= 7; d++) {
        var nd = (day + d) % 7;
        var nh = SCHEDULE[nd] || [];
        if (nh.length > 0) return { label: d === 1 ? '明日' : WEEKDAYS[nd], hour: nh[0] };
      }
      return null;
    }

    function updateNextInfo(now) {
      var next = getNextSchedule(now);
      document.getElementById('next-info').textContent =
        next ? '次のお話し：' + next.label + ' ' + next.hour + '時' : '';
    }

    updateClock();
    setInterval(updateClock, 10000);

    // ===== アラーム音 =====
    function playAlarm() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        function tone(freq, start, dur) {
          var osc = ctx.createOscillator(), gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = freq; osc.type = 'sine';
          gain.gain.setValueAtTime(0, ctx.currentTime + start);
          gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + start + 0.05);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + dur + 0.1);
        }
        tone(880, 0.0, 0.6);
        tone(660, 0.8, 0.6);
        tone(880, 1.6, 0.6);
        tone(660, 2.4, 0.6);
        tone(880, 3.2, 1.0);
      } catch(e) { console.log('alarm error:', e); }
    }

    // ===== 初回タップ / 自動アクティベート =====
    function activatePage() {
      pageActivated = true;
      document.getElementById('ready-banner').classList.add('hidden');
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.1);
      } catch(e) {}
      statusEl.textContent = 'ボタンを押してください';
      if (sdkLoaded) log('✅ 準備完了');
    }

    // ===== URL パラメータ ?auto=1 =====
    var autoMode = window.location.search.indexOf('auto=1') !== -1;
    if (autoMode) { activatePage(); }

    // ===== タイマーチェック =====
    function checkTimer() {
      if (!pageActivated || !sdkLoaded || conversation) return;
      var now = new Date();
      var day = now.getDay(), h = now.getHours(), m = now.getMinutes();
      if (m <= 3) {
        var key = day + '-' + h;
        if (key !== lastTriggeredKey) {
          var hours = SCHEDULE[day] || [];
          if (hours.indexOf(h) !== -1) {
            lastTriggeredKey = key;
            hideScreensaver();
            playAlarm();
            setTimeout(function() {
              if (!conversation) startConversation();
            }, 5000);
          }
        }
      }
    }
    setInterval(checkTimer, 10000);

    // ===== SDK読み込み =====
    import('https://esm.sh/@elevenlabs/client')
      .then(function(module) {
        Conversation = module.Conversation;
        sdkLoaded = true;
        if (autoMode) {
          hideScreensaver();
          playAlarm();
          setTimeout(function() {
            if (!conversation) startConversation();
          }, 5000);
        } else {
          log(pageActivated ? '✅ 準備完了' : '✅ SDK読み込み完了');
          if (pageActivated) statusEl.textContent = 'ボタンを押してください';
        }
      })
      .catch(function(err) { log('読み込み失敗: ' + err.message); });

    // ===== ボタン状態 =====
    function setBtn(state) {
      btn.className = state;
      if (state === 'connecting') {
        btn.innerHTML = '⏳<br>接続中…';
        statusEl.textContent = 'つながっています…';
      } else if (state === 'talking') {
        btn.innerHTML = '🌸<br>お話し中<br><small style="font-size:0.85rem;opacity:0.7">（押すと終了）</small>';
        statusEl.textContent = 'どうぞ、お話しください';
      } else {
        btn.innerHTML = '🎋<br>お話しする';
        btn.className = '';
        statusEl.textContent = 'ボタンを押してください';
      }
    }

    // ===== 会話開始 =====
    async function startConversation() {
      if (!sdkLoaded) { log('もう少しお待ちください…'); return; }
      hideScreensaver();
      setBtn('connecting');
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
        log('接続中…');

        // システムプロンプトを組み立て（ベース + 記憶から取得した追加分）
        var fullSystemPrompt = BASE_PROMPT;
        if (systemPromptAddition) {
          fullSystemPrompt += '\n\n【前回までの記憶】\n' + systemPromptAddition;
        }

        sessionStartTime = new Date();
        currentConversationId = null;

        if (!agentId) {
          log('エラー: agentId が設定されていません');
          setBtn('idle');
          return;
        }

        conversation = await Conversation.startSession({
          agentId: agentId,
          overrides: {
            agent: {
              prompt: {
                prompt: fullSystemPrompt,
              },
            },
          },
          onConnect: function(props) {
            log('接続しました ✅');
            setBtn('talking');
            // conversationId を取得して保持
            if (props && props.conversationId) {
              currentConversationId = props.conversationId;
              console.log('[connect] conversationId:', currentConversationId);
            }
          },
          onDisconnect: function() {
            var endedConversationId = currentConversationId;
            conversation = null;
            currentConversationId = null;
            setBtn('idle');
            statusEl.textContent = 'またお話ししましょう 🎋';

            // バックエンドへ会話分析をリクエスト
            postAnalyze(endedConversationId);

            // 会話終了後2分でスクリーンセーバー起動
            setTimeout(function() {
              if (!conversation) showScreensaver();
            }, 2 * 60 * 1000);
          },
          onError: function(err) {
            log('エラー: ' + (err.message || JSON.stringify(err)));
            conversation = null;
            currentConversationId = null;
            setBtn('idle');
          },
          onModeChange: function(mode) {
            if (mode.mode === 'speaking') statusEl.textContent = '🔊 話しています…';
            else if (mode.mode === 'listening') statusEl.textContent = '🎤 聞いています…';
          }
        });
      } catch(err) {
        log('エラー: ' + err.message); setBtn('idle');
        if (err.name === 'NotAllowedError') statusEl.textContent = 'マイクを許可してください';
      }
    }

    async function stopConversation() {
      if (conversation) {
        await conversation.endSession();
        // onDisconnect が呼ばれるので、ここでは conversation をクリアしない
      } else {
        setBtn('idle');
        statusEl.textContent = 'またお話ししましょう 🎋';
        log('✅ 準備完了');
        // 手動終了後2分でスクリーンセーバー起動
        setTimeout(function() {
          if (!conversation) showScreensaver();
        }, 2 * 60 * 1000);
      }
    }

    function onBtnClick() {
      if (!pageActivated) { activatePage(); return; }
      if (conversation) stopConversation();
      else startConversation();
    }

    // ===== Service Worker 登録 =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/public/sw.js')
          .then(function(reg) { console.log('[SW] 登録完了:', reg.scope); })
          .catch(function(err) { console.warn('[SW] 登録失敗:', err); });
      });
    }
  </script>

</body>
</html>
